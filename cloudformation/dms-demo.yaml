AWSTemplateFormatVersion: '2010-09-09'
Description: >
  AWS Summit BLR 2026 Demo - Near Real-Time Data Pipelines with AWS DMS.
  RDS MySQL (source) -> DMS Replication Instance -> RDS MySQL (target).
  Full Load + CDC via binlog. Free-tier sized, publicly accessible (IP-allowlisted).
  DO NOT USE IN PRODUCTION.

Parameters:
  ProjectName:
    Type: String
    Default: dms-demo
    Description: Prefix for all resource names.

  MyIpCidr:
    Type: String
    Description: Your public IP in CIDR form (e.g. 203.0.113.7/32). Only this IP can reach Aurora.
    AllowedPattern: ^(\d{1,3}\.){3}\d{1,3}/\d{1,2}$

  DBMasterUsername:
    Type: String
    Default: admin
    MinLength: 1
    MaxLength: 16
    AllowedPattern: '[a-zA-Z][a-zA-Z0-9]*'

  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 41
    Description: Master password for both Aurora clusters.
    AllowedPattern: '[a-zA-Z0-9!#$%&()*+,\-.:;<=>?@\[\]^_`{|}~]+'

  DBInstanceClass:
    Type: String
    Default: db.t3.micro
    Description: Free-tier eligible RDS instance class.

  DmsInstanceClass:
    Type: String
    Default: dms.t3.small
    AllowedValues: [dms.t3.small, dms.t3.medium, dms.t3.large]

  MySQLEngineVersion:
    Type: String
    Default: '8.0.42'
    Description: RDS MySQL engine version.

Resources:

  # ---------------- NETWORK ----------------
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-vpc'}]

  IGW:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-igw'}]

  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref IGW

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.42.1.0/24
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-public-a'}]

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.42.2.0/24
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-public-b'}]

  PublicRT:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-public-rt'}]

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties:
      RouteTableId: !Ref PublicRT
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref IGW

  PublicSubnetARTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetA, RouteTableId: !Ref PublicRT }

  PublicSubnetBRTA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref PublicSubnetB, RouteTableId: !Ref PublicRT }

  # ---------------- SECURITY ----------------
  DbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: RDS access from my IP and from DMS
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: !Ref MyIpCidr
          Description: Demo laptop
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-db-sg'}]

  DmsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DMS replication instance SG
      VpcId: !Ref VPC
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags: [{Key: Name, Value: !Sub '${ProjectName}-dms-sg'}]

  DbFromDmsIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref DbSecurityGroup
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !Ref DmsSecurityGroup
      Description: RDS from DMS

  # ---------------- RDS PARAM GROUP (binlog ON for source) ----------------
  SourceDbParamGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: RDS MySQL params enabling binlog ROW format for DMS CDC
      Family: mysql8.0
      Parameters:
        binlog_format: ROW
        binlog_row_image: Full
        binlog_checksum: NONE

  TargetDbParamGroup:
    Type: AWS::RDS::DBParameterGroup
    Properties:
      Description: RDS MySQL target parameter group
      Family: mysql8.0
      Parameters: {}

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: RDS subnet group
      SubnetIds: [!Ref PublicSubnetA, !Ref PublicSubnetB]

  # ---------------- RDS SOURCE ----------------
  SourceInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-src'
      Engine: mysql
      EngineVersion: !Ref MySQLEngineVersion
      DBName: demo
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: '20'
      StorageType: gp2
      StorageEncrypted: true
      PubliclyAccessible: true
      MultiAZ: false
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [!Ref DbSecurityGroup]
      DBParameterGroupName: !Ref SourceDbParamGroup
      BackupRetentionPeriod: 1      # enables binlog

  # ---------------- RDS TARGET ----------------
  TargetInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${ProjectName}-tgt'
      Engine: mysql
      EngineVersion: !Ref MySQLEngineVersion
      DBName: demo
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      DBInstanceClass: !Ref DBInstanceClass
      AllocatedStorage: '20'
      StorageType: gp2
      StorageEncrypted: true
      PubliclyAccessible: true
      MultiAZ: false
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups: [!Ref DbSecurityGroup]
      DBParameterGroupName: !Ref TargetDbParamGroup
      BackupRetentionPeriod: 1

  # ---------------- DMS PREREQ IAM ROLES ----------------
  # DMS requires these EXACT role names the first time it is used in an account/region.
  DmsVpcRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dms-vpc-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: dms.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonDMSVPCManagementRole

  DmsCloudwatchLogsRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: dms-cloudwatch-logs-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal: { Service: dms.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonDMSCloudWatchLogsRole

  # ---------------- DMS ----------------
  DmsSubnetGroup:
    Type: AWS::DMS::ReplicationSubnetGroup
    DependsOn: [DmsVpcRole, DmsCloudwatchLogsRole]
    Properties:
      ReplicationSubnetGroupIdentifier: !Sub '${ProjectName}-dms-subnets'
      ReplicationSubnetGroupDescription: DMS subnet group
      SubnetIds: [!Ref PublicSubnetA, !Ref PublicSubnetB]

  DmsReplicationInstance:
    Type: AWS::DMS::ReplicationInstance
    Properties:
      ReplicationInstanceIdentifier: !Sub '${ProjectName}-ri'
      ReplicationInstanceClass: !Ref DmsInstanceClass
      AllocatedStorage: 50
      PubliclyAccessible: false
      MultiAZ: false
      ReplicationSubnetGroupIdentifier: !Ref DmsSubnetGroup
      VpcSecurityGroupIds: [!Ref DmsSecurityGroup]

  SourceEndpoint:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: !Sub '${ProjectName}-src-ep'
      EndpointType: source
      EngineName: mysql
      ServerName: !GetAtt SourceInstance.Endpoint.Address
      Port: 3306
      DatabaseName: demo
      Username: !Ref DBMasterUsername
      Password: !Ref DBMasterPassword

  TargetEndpoint:
    Type: AWS::DMS::Endpoint
    Properties:
      EndpointIdentifier: !Sub '${ProjectName}-tgt-ep'
      EndpointType: target
      EngineName: mysql
      ServerName: !GetAtt TargetInstance.Endpoint.Address
      Port: 3306
      DatabaseName: demo
      Username: !Ref DBMasterUsername
      Password: !Ref DBMasterPassword

  ReplicationTask:
    Type: AWS::DMS::ReplicationTask
    Properties:
      ReplicationTaskIdentifier: !Sub '${ProjectName}-task'
      MigrationType: full-load-and-cdc
      ReplicationInstanceArn: !Ref DmsReplicationInstance
      SourceEndpointArn: !Ref SourceEndpoint
      TargetEndpointArn: !Ref TargetEndpoint
      TableMappings: |
        {
          "rules": [
            {
              "rule-type": "selection",
              "rule-id": "1",
              "rule-name": "1",
              "object-locator": { "schema-name": "demo", "table-name": "%" },
              "rule-action": "include"
            }
          ]
        }
      ReplicationTaskSettings: |
        {
          "TargetMetadata": { "SupportLobs": true, "LobChunkSize": 64, "LimitedSizeLobMode": true, "LobMaxSize": 32 },
          "FullLoadSettings": { "TargetTablePrepMode": "DROP_AND_CREATE", "MaxFullLoadSubTasks": 4, "CommitRate": 10000 },
          "Logging": { "EnableLogging": true },
          "ChangeProcessingTuning": { "BatchApplyEnabled": true }
        }

Outputs:
  VpcId:
    Value: !Ref VPC
  PublicSubnetAId:
    Value: !Ref PublicSubnetA
  PublicSubnetBId:
    Value: !Ref PublicSubnetB
  DbSecurityGroupId:
    Value: !Ref DbSecurityGroup
  SourceEndpointAddress:
    Value: !GetAtt SourceInstance.Endpoint.Address
  TargetEndpointAddress:
    Value: !GetAtt TargetInstance.Endpoint.Address
  ReplicationTaskArn:
    Value: !Ref ReplicationTask
  MySQLConnectSource:
    Value: !Sub 'mysql -h ${SourceInstance.Endpoint.Address} -u ${DBMasterUsername} -p demo'
  MySQLConnectTarget:
    Value: !Sub 'mysql -h ${TargetInstance.Endpoint.Address} -u ${DBMasterUsername} -p demo'
