  LiveTrendDataSetArn:
    Value: !GetAtt LiveTrendDataSet.Arn
  PaymentFailuresDataSetArn:
    Value: !GetAtt PaymentFailuresDataSet.Arn
  GeoDataSetArn:
    Value: !GetAtt GeoDataSet.Arn
  DeviceDataSetArn:
    Value: !GetAtt DeviceDataSet.Arn
  BusinessMetricsDashboardArn:
    Value: !GetAtt BusinessMetricsDashboard.Arn
  BusinessMetricsAnalysisArn:
    Value: !GetAtt BusinessMetricsAnalysis.Arn
  QuickSightConsoleUrl:
    Value: !Sub 'https://${AWS::Region}.quicksight.aws.amazon.com/sn/start'
